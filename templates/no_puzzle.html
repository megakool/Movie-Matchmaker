{% extends "base.html" %}
{% block title %}No Puzzle Today{% endblock %}

{% block content %}
<div class="nopuzzle-wrap">
  <div class="nopuzzle-card">
    <h1>Come back soon!</h1>
    <p>There's no puzzle for {{ puzzle_date }} yet. Check back later or browse the archive.</p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <a href="/marquee/archive" class="btn btn--primary">Browse Archive</a>
      <a href="/marquee/create" class="btn">Build a Category</a>
    </div>
  </div>
</div>
{% endblock %}
